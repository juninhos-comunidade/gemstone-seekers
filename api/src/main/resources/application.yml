spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: gemstone-seekers-api

  main:
    banner-mode: console

  banner:
    location: classpath:banner.txt

  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gemstone_seekers_db}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.gemstoneseekers: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:INFO}
  pattern:
    level: "%5p [${spring.application.name:}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized

gemstoneseekers:
  security:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
